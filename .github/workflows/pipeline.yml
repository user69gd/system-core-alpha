name: System Core CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install -r requirements.txt

    - name: Compile C++ Core
      run: g++ src/core_logic.cpp -o src/core_logic

    - name: Run Python Tests
      run: pytest tests/test_logic.py

    - name: Compile C Integrity Check
      run: gcc tests/logic_integrity_check.c -o tests/integrity_check

    - name: Run C Integrity Check
      run: ./tests/integrity_check
      
    - name: Run Python Tests
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        pytest tests/test_logic.py